name: Inspections

on: pull_request

permissions:
  contents: read

jobs:
  runPHPCSInspection:
    name: Run PHPCS inspection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: phpcs-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --no-scripts

      - name: Install cs2pr
        run: |
          curl -fsSL -o cs2pr https://github.com/staabm/annotate-pull-request-from-checkstyle/releases/latest/download/cs2pr
          chmod +x cs2pr

      - name: Run PHPCS inspection
        run: |
          set +e
          ./vendor/bin/phpcs \
            --standard=WordPress,WordPress-Core,WordPress-Docs \
            --ignore=tests/*,.github/* \
            --exclude=WordPress.Files.FileName \
            --report=checkstyle \
            --report-file=phpcs-report.xml \
            src
          phpcs_exit=$?

          if [[ -s phpcs-report.xml ]]; then
            ./cs2pr < phpcs-report.xml || true
          fi

          exit $phpcs_exit
